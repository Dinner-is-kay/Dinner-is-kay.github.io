<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout with RL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        canvas {
            border: 2px solid #3498db;
            background-color: #000;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .score-info {
            text-align: center;
            margin: 10px 0;
        }
        .settings {
            text-align: center;
            margin: 20px 0;
        }
        select, input {
            margin: 5px;
            padding: 5px;
        }
        .ai-info {
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Breakout with Reinforcement Learning</h1>
    <div class="settings">
        <label>Difficulty: 
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
        </label>
        <label>Level: 
            <select id="levelSelect">
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
            </select>
        </label>
        <label>Sound: <input type="checkbox" id="soundEnabled" checked></label>
    </div>
    <div class="controls">
        <button id="start">Start Game</button>
        <button id="pause">Pause</button>
        <button id="train">Train AI</button>
        <button id="playAI">Play with AI</button>
        <button id="reset">Reset Game</button>
    </div>
    <div class="score-info">
        <p id="score">Score: 0</p>
        <p id="highScore">High Score: 0</p>
        <p id="level">Level: 1</p>
        <p id="lives">Lives: 3</p>
    </div>
    <div class="ai-info" id="aiInfo"></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="breakout.js"></script>
</body>
</html></content>
