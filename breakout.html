<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout with RL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 10px;
            background-color: #f4f4f4;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            font-size: 14px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .left-panel {
            flex: 1;
            min-width: 200px;
        }
        .right-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 2px solid #3498db;
            background-color: #000;
            display: block;
            max-width: 100%;
            height: auto;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
        }
        button {
            margin: 0;
            padding: 8px 12px;
            font-size: 12px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .settings {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .score-info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .ai-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h1>Breakout with Reinforcement Learning</h1>
    <div class="container">
        <div class="left-panel">
            <div class="settings">
                <label>Difficulty: 
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                    </select>
                </label>
                <label>Level: 
                    <select id="levelSelect">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </label>
                <label>Sound: <input type="checkbox" id="soundEnabled" checked></label>
            </div>
            <div class="controls">
                <button id="start">Start</button>
                <button id="pause">Pause</button>
                <button id="train">Train AI</button>
                <button id="playAI">Play AI</button>
                <button id="reset">Reset</button>
            </div>
            <div class="score-info">
                <span id="score">Score: 0</span>
                <span id="highScore">High: 0</span>
                <span id="level">Level: 1</span>
                <span id="lives">Lives: 3</span>
                <span id="episodes">Episodes: 0</span>
            </div>
            <div class="ai-info" id="aiInfo"></div>
        </div>
        <div class="right-panel">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
    </div>
    <script src="breakout.js"></script>
</body>
</html></content>
